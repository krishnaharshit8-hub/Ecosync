version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - MQTT_HOST=mosquitto
    ports:
      - "8000:8000"
    depends_on:
      - mosquitto

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - backend
